name: 'GH Actions - Release'
permissions:
    contents: write
    pull-requests: read

on:
  release:
    types:
      - created
      - edited

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          # Source tarballs only
          - FROM:     'debian:bookworm'
            ARTIFACT_EXT: 'tar.[xb]z*'
          # only build one Deb File b/c they're so large
          - FROM:     'debian:bookworm'
            ARTIFACT_EXT: 'deb'
          - FROM:     'opensuse/leap:16.0'
            ARTIFACT_EXT: 'rpm'
          - FROM:     'opensuse/leap:15.6'
            ARTIFACT_EXT: 'rpm'
          - FROM:     'fedora:43'
            ARTIFACT_EXT: 'rpm'
          - FROM:     'fedora:42'
            ARTIFACT_EXT: 'rpm'
          - FROM:     'rockylinux_rockylinux:10.1'
            ARTIFACT_EXT: 'rpm'
          - FROM:     'rockylinux_rockylinux:9.7'
            ARTIFACT_EXT: 'rpm'

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      with:
        fetch-depth: 2
        submodules: false

    - name: Extract tag name and short SHA
      shell: bash
      run: |
        echo "TAG_NAME=$(echo ${GITHUB_REF#refs/tags/} | sed 's/\//_/g')" >> $GITHUB_ENV
        echo "SHORT_SHA=`git rev-parse --short HEAD`" >> $GITHUB_ENV
    - name: Test tag name and short SHA
      run: |
        echo "${TAG_NAME}"
        echo "${SHORT_SHA}"

    - name: Run CI
      env:
        FROM:       ${{ matrix.FROM }}
        FLAGS:      ''
        IS_RELEASE: 1
      run: script/cibuild $FLAGS

    - name: Upload the artifacts
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: "packages/*.${{ matrix.ARTIFACT_EXT }}"
